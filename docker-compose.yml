version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cktt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cktt-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cktt-postgres
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cktt-network
    restart: unless-stopped

  # API Service
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/app/Dockerfile.api
    container_name: cktt-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=agent_platform
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cktt-network
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/app/Dockerfile.worker
    container_name: cktt-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cktt-network
    restart: unless-stopped
    deploy:
      replicas: 1

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cktt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - cktt-network
    restart: unless-stopped

networks:
  cktt-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
